name: Deploy CDK

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the environment'
        required: true
        default: 'dev'
        options:
          - dev
          - staging
          - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Install dependencies
        run: npm install

      - name: CDK Synth
        run: npx cdk synth --context environment=${{ github.event.inputs.environment }}

      - name: CDK Deploy
        run: npx cdk deploy --context environment=${{ github.event.inputs.environment }} --require-approval never
