name: CDK Synth

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  synth:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install CDK
        run: npm install -g aws-cdk
      
      - name: Install CDK dependencies
        working-directory: ./cdk
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # OPTION 1: Direct AWS Credentials
      - name: Configure AWS credentials (Direct)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      # OPTION 2: Assume IAM Role (Recommended for production)
      # Uncomment below to use assume role instead of direct credentials
      # - name: Configure AWS credentials (Assume Role)
      #   uses: aws-actions/configure-aws-credentials@v2
      #   with:
      #     role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      #     aws-region: us-east-1
      
      - name: CDK Synth
        working-directory: ./cdk
        run: cdk synth -c env=dev
      
      - name: CDK Deploy
        working-directory: ./cdk
        run: cdk deploy --all --require-approval=never -c env=dev


